<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI物料中台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="sidebar-brand">
          <div class="brand-copy">
            <div class="eyebrow brand-eyebrow">物料管理</div>
            <h1 class="brand-title">AI物料中台</h1>
          </div>
          <button id="sidebarToggle" class="icon-button sidebar-toggle" type="button" aria-label="收起侧边栏" aria-expanded="true">&lt;</button>
        </div>
        <nav id="sidebarNav" class="sidebar-nav"></nav>
      </aside>
      <div class="workspace">
        <header class="workspace-header">
          <div>
            <div class="eyebrow" id="workspaceEyebrow">企业级标准化物料平台</div>
          </div>
          <div class="workspace-actions">
            <button id="languageToggle" class="secondary language-toggle" type="button">EN</button>
            <div id="sessionBar" class="session-bar"></div>
          </div>
        </header>
        <main id="app" class="shell"></main>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
